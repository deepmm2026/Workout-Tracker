<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymSplit">
<meta name="theme-color" content="#08090c">
<title>GymSplit — 4 Day Workout Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#08090c;--surface:#0f1117;--card:#161b26;--border:#1e2535;
  --text:#e8eaf0;--muted:#6b7399;--accent:#f0c040;
  --d1:#e84545;--d2:#3b82f6;--d3:#10b981;--d4:#a855f7;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
button{font-family:'DM Sans',sans-serif;cursor:pointer;}
textarea{font-family:'DM Sans',sans-serif;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;background:var(--bg);}
.screen.active{display:block;}

/* ── TOP BAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:50;}
.topbar-row{display:flex;align-items:center;gap:10px;}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:1px;}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-back{background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--muted);font-size:12px;}
.btn-icon{background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--muted);font-size:14px;}

/* ── CONTENT ── */
.content{padding:16px 20px;max-width:640px;margin:0 auto;}

/* ── WEEK BAR ── */
.week-bar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px;}
.week-cell{background:transparent;border:1px solid transparent;border-radius:8px;padding:8px 3px;text-align:center;}
.week-cell.today{background:var(--card);border-color:var(--border);}
.week-cell .wd{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.week-cell .wl{font-size:9px;font-weight:700;margin-top:4px;}

/* ── SECTION LABEL ── */
.sec-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin:16px 0 8px;}

/* ── TODAY CARD ── */
.today-card{border-radius:14px;padding:20px;margin-bottom:16px;cursor:pointer;}
.today-card-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;letter-spacing:1px;}
.today-card-sub{font-size:12px;color:var(--muted);margin-top:2px;margin-bottom:12px;}
.today-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.today-pill{font-size:10px;color:var(--muted);background:rgba(0,0,0,0.35);padding:3px 8px;border-radius:6px;}
.today-btn{border:none;border-radius:10px;padding:12px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;color:#000;width:100%;}

/* ── DAY ROWS ── */
.day-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.2s;}
.day-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.day-icon span{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:1px;}
.day-row-info{flex:1;}
.day-row-name{font-size:14px;font-weight:700;}
.day-row-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.day-row-count{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;}

/* ── REST DAY ── */
.rest-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;text-align:center;margin-bottom:16px;}
.rest-emoji{font-size:36px;margin-bottom:8px;}
.rest-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:1px;margin-bottom:4px;}
.rest-sub{font-size:13px;color:var(--muted);}

/* ── STATS CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 10px;text-align:center;}
.stat-icon{font-size:22px;margin-bottom:6px;}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;color:var(--accent);}
.stat-lbl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:2px;}

/* ── HISTORY ── */
.hist-card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:10px;}
.hist-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.hist-day{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;}
.hist-date{font-size:12px;color:var(--muted);margin-top:2px;}
.hist-badge{font-size:11px;font-weight:700;letter-spacing:1px;}
.hist-note{margin-top:8px;font-size:12px;color:var(--muted);font-style:italic;border-top:1px solid var(--border);padding-top:8px;}
.hist-pills{display:flex;gap:8px;flex-wrap:wrap;}
.hist-pill{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

/* ── SESSION ── */
.session-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:50;}
.session-progress-bar{height:4px;background:#1e2535;border-radius:4px;overflow:hidden;margin-top:10px;}
.session-progress-fill{height:100%;border-radius:4px;transition:width 0.4s ease;}
.session-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.session-meta span{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}

/* ── EXERCISE CARD ── */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color 0.2s;}
.ex-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;}
.ex-check{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;transition:all 0.2s;}
.ex-check.done{color:#000;}
.ex-check.progress{background:#1e2535;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.ex-name{font-size:14px;font-weight:700;letter-spacing:0.2px;}
.ex-meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:3px;}
.ex-meta-item{font-size:11px;color:var(--muted);}
.ex-meta-item strong{color:var(--accent);}
.ex-vol{font-family:'DM Mono',monospace;font-size:11px;}
.ex-chevron{color:var(--muted);font-size:11px;transition:transform 0.2s;flex-shrink:0;}
.ex-card.open .ex-chevron{transform:rotate(180deg);}
.ex-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border);}
.ex-card.open .ex-body{display:block;}

/* ── SET LABELS ── */
.set-labels{display:flex;gap:8px;padding:10px 0 6px;padding-left:34px;}
.set-lbl{flex:1;text-align:center;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.set-lbl.w34{width:34px;flex:none;}

/* ── SET ROW ── */
.set-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;min-width:26px;text-align:right;}
.set-input{flex:1;background:#0f1117;border:1px solid #1e2535;border-radius:8px;padding:9px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;text-align:center;width:100%;}
.set-input:focus{border-color:#3a4060;}
.set-done-btn{width:36px;height:36px;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;transition:all 0.15s;}
.add-set-btn{margin-top:4px;margin-left:34px;background:transparent;border:1px dashed #1e2535;border-radius:8px;padding:7px 16px;color:var(--muted);font-size:12px;width:calc(100% - 34px);}

/* ── NOTE ── */
.note-area{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:13px;resize:vertical;min-height:80px;outline:none;}
.note-area:focus{border-color:#3a4060;}
.finish-btn{width:100%;border:none;border-radius:12px;padding:14px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;color:#000;margin-top:12px;}
.save-btn{border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:13px;color:#000;letter-spacing:0.5px;}

/* ── TIMER OVERLAY ── */
#timer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
#timer-overlay.show{display:flex;}
.timer-box{background:#0f1117;border:1px solid #1e2535;border-radius:20px;padding:40px 48px;text-align:center;min-width:280px;}
.timer-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.timer-val{font-family:'Barlow Condensed',sans-serif;font-size:80px;font-weight:900;line-height:1;color:var(--accent);margin-bottom:18px;}
.timer-bar-bg{height:4px;background:#1e2535;border-radius:4px;overflow:hidden;margin-bottom:20px;}
.timer-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 1s linear;}
.timer-skip{background:transparent;border:1px solid #1e2535;color:var(--muted);border-radius:8px;padding:8px 24px;font-size:13px;}

/* ── DONE BADGE ── */
.done-badge{font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:20px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
</style>
</head>
<body>

<!-- ═══════════════ HOME SCREEN ═══════════════ -->
<div id="screen-home" class="screen active">
  <div class="topbar">
    <div class="topbar-row">
      <div style="flex:1">
        <div style="font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;">Your Program</div>
        <div class="topbar-title">4-DAY <span style="color:var(--accent)">SPLIT</span></div>
      </div>
      <button class="btn-icon" onclick="showScreen('stats')">📊</button>
      <button class="btn-icon" onclick="showScreen('history')" style="margin-left:6px;">📋</button>
    </div>
  </div>
  <div class="content">
    <div class="week-bar" id="week-bar"></div>
    <div id="home-main"></div>
    <div class="sec-label">All Training Days</div>
    <div id="all-days"></div>
  </div>
</div>

<!-- ═══════════════ SESSION SCREEN ═══════════════ -->
<div id="screen-session" class="screen">
  <div class="session-topbar" id="session-topbar">
    <div class="topbar-row">
      <button class="btn-back" onclick="backFromSession()">← Back</button>
      <div style="flex:1;margin-left:4px;">
        <div class="topbar-title" id="session-title"></div>
        <div class="topbar-sub" id="session-sub"></div>
      </div>
      <button class="save-btn" id="session-save-btn" onclick="saveSession()">SAVE</button>
    </div>
    <div class="session-progress-bar"><div class="session-progress-fill" id="session-progress-fill"></div></div>
    <div class="session-meta">
      <span id="session-progress-text"></span>
      <span id="session-sets-text"></span>
    </div>
  </div>
  <div class="content" id="session-content"></div>
</div>

<!-- ═══════════════ HISTORY SCREEN ═══════════════ -->
<div id="screen-history" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <button class="btn-back" onclick="showScreen('home')">← Back</button>
      <div class="topbar-title" style="margin-left:6px;">HISTORY</div>
    </div>
  </div>
  <div class="content" id="history-content"></div>
</div>

<!-- ═══════════════ STATS SCREEN ═══════════════ -->
<div id="screen-stats" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <button class="btn-back" onclick="showScreen('home')">← Back</button>
      <div class="topbar-title" style="margin-left:6px;">STATS</div>
    </div>
  </div>
  <div class="content" id="stats-content"></div>
</div>

<!-- ═══════════════ REST TIMER ═══════════════ -->
<div id="timer-overlay">
  <div class="timer-box">
    <div class="timer-label">Rest Timer</div>
    <div class="timer-val" id="timer-val">90</div>
    <div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-bar"></div></div>
    <button class="timer-skip" onclick="stopTimer()">Skip</button>
  </div>
</div>

<script>
// ─── PROGRAM DATA ─────────────────────────────────────────────────
const PROGRAM = [
  { id:"d1", day:1, label:"PUSH", sub:"Chest · Shoulders · Triceps", color:"#e84545",
    exercises:[
      {id:"d1e1",name:"Barbell Bench Press",sets:4,reps:"6–8",rest:90,muscle:"Chest"},
      {id:"d1e2",name:"Incline Dumbbell Press",sets:3,reps:"10–12",rest:75,muscle:"Upper Chest"},
      {id:"d1e3",name:"Overhead Press",sets:4,reps:"8–10",rest:90,muscle:"Shoulders"},
      {id:"d1e4",name:"Cable Lateral Raise",sets:3,reps:"15–20",rest:60,muscle:"Side Delts"},
      {id:"d1e5",name:"Tricep Rope Pushdown",sets:3,reps:"12–15",rest:60,muscle:"Triceps"},
      {id:"d1e6",name:"Overhead Tricep Extension",sets:3,reps:"12–15",rest:60,muscle:"Triceps Long Head"},
    ]},
  { id:"d2", day:2, label:"PULL", sub:"Back · Biceps · Rear Delts", color:"#3b82f6",
    exercises:[
      {id:"d2e1",name:"Deadlift (Conventional)",sets:4,reps:"5",rest:180,muscle:"Full Posterior"},
      {id:"d2e2",name:"Pull-Ups / Lat Pulldown",sets:4,reps:"8–10",rest:90,muscle:"Lats"},
      {id:"d2e3",name:"Barbell Bent-Over Row",sets:4,reps:"8–10",rest:90,muscle:"Mid Back"},
      {id:"d2e4",name:"Dumbbell Bicep Curl",sets:3,reps:"12–15",rest:60,muscle:"Biceps"},
      {id:"d2e5",name:"Face Pulls (Cable)",sets:3,reps:"15–20",rest:60,muscle:"Rear Delts"},
    ]},
  { id:"d3", day:3, label:"LEGS", sub:"Quads · Hamstrings · Glutes · Calves", color:"#10b981",
    exercises:[
      {id:"d3e1",name:"Barbell Back Squat",sets:4,reps:"6–8",rest:180,muscle:"Quads/Glutes"},
      {id:"d3e2",name:"Romanian Deadlift (RDL)",sets:3,reps:"10–12",rest:90,muscle:"Hamstrings"},
      {id:"d3e3",name:"Leg Press",sets:3,reps:"12–15",rest:90,muscle:"Quads/Glutes"},
      {id:"d3e4",name:"Walking Lunges",sets:3,reps:"10 ea leg",rest:75,muscle:"Quads/Balance"},
      {id:"d3e5",name:"Standing Calf Raise",sets:4,reps:"20–25",rest:45,muscle:"Calves"},
    ]},
  { id:"d4", day:4, label:"FULL", sub:"Compound Strength · Core", color:"#a855f7",
    exercises:[
      {id:"d4e1",name:"Power Clean / Hang Clean",sets:4,reps:"4–5",rest:120,muscle:"Full Body"},
      {id:"d4e2",name:"Goblet Squat",sets:3,reps:"12–15",rest:75,muscle:"Quads/Core"},
      {id:"d4e3",name:"Single-Arm Dumbbell Row",sets:3,reps:"12 ea side",rest:60,muscle:"Back/Biceps"},
      {id:"d4e4",name:"Ab Wheel Rollout",sets:3,reps:"10–15",rest:60,muscle:"Core"},
      {id:"d4e5",name:"Farmer's Carry",sets:3,reps:"30–40m",rest:90,muscle:"Full Body/Grip"},
    ]},
];
const DAY_PLAN = [0,1,null,2,3,null,null]; // Mon=0 index
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ─── STORAGE ──────────────────────────────────────────────────────
function load(){try{return JSON.parse(localStorage.getItem("gymsplit")||"{}");}catch{return{};}}
function save(d){try{localStorage.setItem("gymsplit",JSON.stringify(d));}catch{}}
let DB = load();

function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(s){return new Date(s+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function todayDow(){const d=new Date().getDay();return d===0?6:d-1;} // Mon=0

// ─── SCREEN ROUTING ───────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
  window.scrollTo(0,0);
  if(id==="home") renderHome();
  if(id==="history") renderHistory();
  if(id==="stats") renderStats();
}

// ─── TIMER ────────────────────────────────────────────────────────
let timerInterval=null, timerTotal=0, timerLeft=0;
function startTimer(seconds){
  stopTimer();
  timerTotal=seconds; timerLeft=seconds;
  document.getElementById("timer-overlay").classList.add("show");
  updateTimerUI();
  timerInterval=setInterval(()=>{
    timerLeft--;
    if(timerLeft<=0){stopTimer();return;}
    updateTimerUI();
  },1000);
}
function updateTimerUI(){
  document.getElementById("timer-val").textContent=timerLeft;
  const pct=((timerTotal-timerLeft)/timerTotal)*100;
  document.getElementById("timer-bar").style.width=pct+"%";
}
function stopTimer(){
  clearInterval(timerInterval);
  document.getElementById("timer-overlay").classList.remove("show");
}

// ─── HOME ─────────────────────────────────────────────────────────
function renderHome(){
  renderWeekBar();
  renderHomeMain();
  renderAllDays();
}

function renderWeekBar(){
  const dow=todayDow();
  const el=document.getElementById("week-bar");
  el.innerHTML=DAYS.map((d,i)=>{
    const pidx=DAY_PLAN[i];
    const plan=pidx!==null?PROGRAM[pidx]:null;
    const isToday=i===dow;
    const col=plan?(isToday?plan.color:plan.color+"77"):"var(--muted)";
    return `<div class="week-cell${isToday?" today":""}">
      <div class="wd">${d}</div>
      <div class="wl" style="color:${col}">${plan?plan.label:"REST"}</div>
    </div>`;
  }).join("");
}

function renderHomeMain(){
  const dow=todayDow();
  const pidx=DAY_PLAN[dow];
  const el=document.getElementById("home-main");
  if(pidx===null){
    el.innerHTML=`<div class="rest-card">
      <div class="rest-emoji">😴</div>
      <div class="rest-title">REST DAY</div>
      <div class="rest-sub">Recovery is part of progress. Stretch, hydrate, sleep well.</div>
    </div>`;
    return;
  }
  const plan=PROGRAM[pidx];
  const todaySess=DB[todayStr()]?.[plan.id];
  const done=todaySess?.completed;
  const pills=plan.exercises.map(e=>`<span class="today-pill">${e.name.split(" ").slice(0,2).join(" ")}</span>`).join("");
  el.innerHTML=`
    <div class="sec-label">Today's Workout</div>
    <div class="today-card" style="background:${plan.color}18;border:1px solid ${plan.color}44;" onclick="startSession('${plan.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="today-card-title" style="color:${plan.color}">DAY ${plan.day} — ${plan.label}</div>
          <div class="today-card-sub">${plan.sub}</div>
        </div>
        ${done?`<span class="done-badge" style="background:${plan.color}22;color:${plan.color};border:1px solid ${plan.color}44;">✓ DONE</span>`:""}
      </div>
      <div class="today-pills">${pills}</div>
      <button class="today-btn" style="background:${plan.color};">${done?"CONTINUE / REVIEW":"START WORKOUT →"}</button>
    </div>`;
}

function renderAllDays(){
  const el=document.getElementById("all-days");
  el.innerHTML=PROGRAM.map(plan=>{
    const cnt=Object.values(DB).filter(d=>d[plan.id]).length;
    return `<div class="day-row" onclick="startSession('${plan.id}')"
      onmouseenter="this.style.borderColor='${plan.color}55'" onmouseleave="this.style.borderColor='var(--border)'">
      <div class="day-icon" style="background:${plan.color}18;border:1px solid ${plan.color}33;">
        <span style="color:${plan.color}">${plan.label}</span>
      </div>
      <div class="day-row-info">
        <div class="day-row-name">Day ${plan.day} — ${plan.label}</div>
        <div class="day-row-sub">${plan.exercises.length} exercises · ${plan.sub.split("·")[0].trim()}</div>
      </div>
      ${cnt>0?`<div class="day-row-count" style="color:${plan.color}">${cnt}×</div>`:""}
      <div style="color:var(--muted);font-size:18px;">›</div>
    </div>`;
  }).join("");
}

// ─── SESSION ──────────────────────────────────────────────────────
let currentPlan=null, sessionExData={}, sessionNote="", sessionStartTime=0;

function startSession(planId){
  currentPlan=PROGRAM.find(p=>p.id===planId);
  const existing=DB[todayStr()]?.[planId];
  sessionExData=existing?.exercises ? JSON.parse(JSON.stringify(existing.exercises)) : {};
  sessionNote=existing?.note||"";
  sessionStartTime=existing?.startTime||Date.now();
  renderSession();
  showScreen("session");
}

function renderSession(){
  const plan=currentPlan;
  document.getElementById("session-title").textContent=`DAY ${plan.day} — ${plan.label}`;
  document.getElementById("session-title").style.color=plan.color;
  document.getElementById("session-sub").textContent=plan.sub;
  document.getElementById("session-save-btn").style.background=plan.color;
  updateSessionProgress();

  let html="";
  plan.exercises.forEach(ex=>{
    const exData=sessionExData[ex.id]||{sets:[]};
    if(!exData.sets||exData.sets.length<ex.sets){
      while(exData.sets.length<ex.sets) exData.sets.push({weight:"",reps:"",done:false});
      sessionExData[ex.id]=exData;
    }
    html+=renderExCard(ex, exData);
  });
  html+=`<div class="sec-label" style="margin-top:20px;">Session Note</div>
    <textarea class="note-area" id="session-note" placeholder="How did it feel? PRs? Notes...">${sessionNote}</textarea>
    <button class="finish-btn" style="background:${plan.color}" onclick="saveSession()">FINISH WORKOUT</button>
    <div style="height:40px;"></div>`;
  document.getElementById("session-content").innerHTML=html;

  // Restore open states & values
  plan.exercises.forEach(ex=>{
    const exData=sessionExData[ex.id];
    if(exData?.sets) exData.sets.forEach((s,i)=>restoreSetRow(ex.id,i,s));
  });

  document.getElementById("session-note").addEventListener("input",e=>{sessionNote=e.target.value;});
}

function renderExCard(ex, exData){
  const doneCnt=exData.sets.filter(s=>s.done).length;
  const allDone=doneCnt===exData.sets.length && exData.sets.length>0;
  const vol=exData.sets.reduce((a,s)=>a+(s.done?(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0):0),0);
  const col=currentPlan.color;

  const checkHtml=allDone
    ?`<div class="ex-check done" style="background:${col}">✓</div>`
    :`<div class="ex-check progress">${doneCnt}/${ex.sets}</div>`;

  let setsHtml=`<div class="set-labels">
    <div class="set-lbl" style="flex:1">Weight</div>
    <div class="set-lbl" style="flex:1">Reps</div>
    <div class="set-lbl w34"></div>
  </div>`;
  exData.sets.forEach((s,i)=>{
    setsHtml+=`<div class="set-row" id="setrow-${ex.id}-${i}">
      <div class="set-num" style="color:${s.done?col:"var(--muted)"}" id="setnum-${ex.id}-${i}">${i+1}</div>
      <input class="set-input" type="number" placeholder="kg/lb" id="w-${ex.id}-${i}" value="${s.weight}" oninput="updateSet('${ex.id}',${i},'weight',this.value)">
      <input class="set-input" type="number" placeholder="reps" id="r-${ex.id}-${i}" value="${s.reps}" oninput="updateSet('${ex.id}',${i},'reps',this.value)">
      <button class="set-done-btn" id="btn-${ex.id}-${i}"
        style="background:${s.done?col:"#1e2535"};color:${s.done?"#000":"var(--muted)"}"
        onclick="toggleSetDone('${ex.id}',${i},${ex.rest})">✓</button>
    </div>`;
  });
  setsHtml+=`<button class="add-set-btn" onclick="addSet('${ex.id}')">+ Add Set</button>`;

  return `<div class="ex-card${allDone?" open":""}" id="excard-${ex.id}" style="border-color:${allDone?col+"44":"var(--border)"}">
    <div class="ex-header" onclick="toggleExCard('${ex.id}')">
      ${checkHtml}
      <div style="flex:1">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta-row">
          <span class="ex-meta-item"><strong>${ex.sets}</strong> sets</span>
          <span class="ex-meta-item"><strong>${ex.reps}</strong> reps</span>
          <span class="ex-meta-item">${ex.rest}s rest</span>
        </div>
      </div>
      ${vol>0?`<div class="ex-vol" style="color:${col}">${vol.toLocaleString()}<span style="color:var(--muted);margin-left:2px">vol</span></div>`:""}
      <div class="ex-chevron">▼</div>
    </div>
    <div class="ex-body">${setsHtml}</div>
  </div>`;
}

function restoreSetRow(exId,i,s){
  const w=document.getElementById(`w-${exId}-${i}`);
  const r=document.getElementById(`r-${exId}-${i}`);
  if(w) w.value=s.weight;
  if(r) r.value=s.reps;
}

function toggleExCard(exId){
  document.getElementById("excard-"+exId).classList.toggle("open");
}

function updateSet(exId,i,field,val){
  sessionExData[exId].sets[i][field]=val;
  refreshExHeader(exId);
}

function toggleSetDone(exId, i, restSecs){
  const s=sessionExData[exId].sets[i];
  s.done=!s.done;
  const col=currentPlan.color;
  const btn=document.getElementById(`btn-${exId}-${i}`);
  const num=document.getElementById(`setnum-${exId}-${i}`);
  btn.style.background=s.done?col:"#1e2535";
  btn.style.color=s.done?"#000":"var(--muted)";
  num.style.color=s.done?col:"var(--muted)";
  if(s.done) startTimer(restSecs);
  refreshExHeader(exId);
  updateSessionProgress();
}

function refreshExHeader(exId){
  const exData=sessionExData[exId];
  const ex=currentPlan.exercises.find(e=>e.id===exId);
  const doneCnt=exData.sets.filter(s=>s.done).length;
  const allDone=doneCnt===exData.sets.length && exData.sets.length>0;
  const vol=exData.sets.reduce((a,s)=>a+(s.done?(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0):0),0);
  const col=currentPlan.color;
  const card=document.getElementById("excard-"+exId);
  card.style.borderColor=allDone?col+"44":"var(--border)";
  const check=card.querySelector(".ex-check");
  if(allDone){check.className="ex-check done";check.style.background=col;check.textContent="✓";}
  else{check.className="ex-check progress";check.style.background="";check.textContent=`${doneCnt}/${ex.sets}`;}
  const volEl=card.querySelector(".ex-vol");
  if(vol>0){
    if(volEl){volEl.textContent="";volEl.innerHTML=`${vol.toLocaleString()}<span style="color:var(--muted);margin-left:2px">vol</span>`;}
  }
}

function addSet(exId){
  sessionExData[exId].sets.push({weight:"",reps:"",done:false});
  // Re-render just this exercise
  const ex=currentPlan.exercises.find(e=>e.id===exId);
  const card=document.getElementById("excard-"+exId);
  const wasOpen=card.classList.contains("open");
  card.outerHTML=renderExCard(ex,sessionExData[exId]);
  const newCard=document.getElementById("excard-"+exId);
  if(wasOpen) newCard.classList.add("open");
  sessionExData[exId].sets.forEach((s,i)=>restoreSetRow(exId,i,s));
}

function updateSessionProgress(){
  const plan=currentPlan;
  const totalEx=plan.exercises.length;
  const doneEx=plan.exercises.filter(ex=>{
    const s=sessionExData[ex.id]?.sets||[];
    return s.length>0&&s.every(x=>x.done);
  }).length;
  const totalSets=plan.exercises.reduce((a,ex)=>a+(sessionExData[ex.id]?.sets?.filter(s=>s.done).length||0),0);
  const pct=(doneEx/totalEx)*100;
  document.getElementById("session-progress-fill").style.width=pct+"%";
  document.getElementById("session-progress-fill").style.background=plan.color;
  document.getElementById("session-progress-text").textContent=`${doneEx}/${totalEx} exercises`;
  document.getElementById("session-sets-text").textContent=`${totalSets} sets done`;
}

function saveSession(){
  const plan=currentPlan;
  const totalEx=plan.exercises.length;
  const doneEx=plan.exercises.filter(ex=>{
    const s=sessionExData[ex.id]?.sets||[];
    return s.length>0&&s.every(x=>x.done);
  }).length;
  const note=document.getElementById("session-note")?.value||sessionNote;
  const date=todayStr();
  if(!DB[date]) DB[date]={};
  DB[date][plan.id]={
    exercises:JSON.parse(JSON.stringify(sessionExData)),
    note,
    startTime:sessionStartTime,
    endTime:Date.now(),
    completed:doneEx===totalEx
  };
  save(DB);
  showScreen("home");
}

function backFromSession(){
  saveSession();
}

// ─── HISTORY ──────────────────────────────────────────────────────
function renderHistory(){
  const entries=[];
  Object.entries(DB).forEach(([date,days])=>{
    Object.entries(days).forEach(([dayId,sess])=>{
      const plan=PROGRAM.find(p=>p.id===dayId);
      if(plan) entries.push({date,sess,plan});
    });
  });
  entries.sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById("history-content");
  if(!entries.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📭</div>No workouts logged yet. Start your first session!</div>`;
    return;
  }
  el.innerHTML=entries.map(({date,sess,plan})=>{
    const totalSets=Object.values(sess.exercises||{}).reduce((a,e)=>a+(e?.sets?.filter(s=>s.done).length||0),0);
    const dur=sess.endTime&&sess.startTime?Math.round((sess.endTime-sess.startTime)/60000):null;
    const pills=Object.entries(sess.exercises||{}).map(([exId,exData])=>{
      const ex=plan.exercises.find(e=>e.id===exId);
      if(!ex||!exData?.sets) return "";
      const best=exData.sets.filter(s=>s.done&&s.weight).reduce((a,s)=>Math.max(a,parseFloat(s.weight)||0),0);
      return best>0?`<span class="hist-pill">${ex.name.split(" ")[0]} <strong style="color:var(--text)">${best}kg</strong></span>`:"";
    }).filter(Boolean).join("");
    return `<div class="hist-card" style="border:1px solid ${plan.color}33;">
      <div class="hist-header">
        <div>
          <div class="hist-day" style="color:${plan.color}">${plan.label} DAY</div>
          <div class="hist-date">${fmtDate(date)}</div>
        </div>
        <div style="text-align:right">
          ${sess.completed?`<div class="hist-badge" style="color:${plan.color}">✓ COMPLETE</div>`:""}
          ${dur?`<div style="font-size:11px;color:var(--muted)">${dur} min</div>`:""}
        </div>
      </div>
      <div class="hist-pills"><span class="hist-pill">${totalSets} sets</span>${pills}</div>
      ${sess.note?`<div class="hist-note">${sess.note}</div>`:""}
    </div>`;
  }).join("");
}

// ─── STATS ────────────────────────────────────────────────────────
function renderStats(){
  const totalWorkouts=Object.values(DB).reduce((a,d)=>a+Object.keys(d).length,0);
  const totalSets=Object.values(DB).reduce((a,days)=>
    a+Object.values(days).reduce((b,sess)=>
      b+Object.values(sess.exercises||{}).reduce((c,ex)=>c+(ex?.sets?.filter(s=>s.done).length||0),0),0),0);
  let streak=0;
  const d=new Date();
  for(let i=0;i<365;i++){
    const str=d.toISOString().slice(0,10);
    if(DB[str]&&Object.keys(DB[str]).length>0){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  const dayCounts=PROGRAM.map(p=>({plan:p,count:Object.values(DB).filter(d=>d[p.id]).length}));

  document.getElementById("stats-content").innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">🏋️</div><div class="stat-val">${totalWorkouts}</div><div class="stat-lbl">Workouts</div></div>
      <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-val">${totalSets}</div><div class="stat-lbl">Total Sets</div></div>
      <div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-val">${streak}</div><div class="stat-lbl">Day Streak</div></div>
    </div>
    <div class="sec-label">Sessions per Day Type</div>
    ${dayCounts.map(({plan,count})=>`
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;">
        <div style="width:8px;height:36px;border-radius:4px;background:${plan.color};flex-shrink:0;"></div>
        <div style="flex:1;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:${plan.color};">${plan.label}</div>
          <div style="font-size:11px;color:var(--muted);">${plan.sub}</div>
        </div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:${count>0?plan.color:"var(--muted)"};">${count}×</div>
      </div>`).join("")}
    <div style="height:20px;"></div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
